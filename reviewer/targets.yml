# Single source of truth for every Bizzal property the reviewer audits.
# Each property is scored daily against the rubric named in `rubric`.
#
# live[]: audience-facing sources, each with a fetch `method`:
#   http        - plain GET, HTML stripped to text (public blogs)
#   youtube_rss - free YouTube RSS feed by channel_id (no key/auth)
#   deferred    - not fetched for free; needs a paid scraper (e.g. Bright Data).
#                 The property is still reviewed on its other sources.
# source: the GitHub repo whose generated content produced it (read via API).
# issue_repo: where the per-property DETAIL issue is filed (usually == source).

defaults:
  owner: bizzal70

properties:
  - id: bizzal-games-youtube
    name: "Bizzal Games — YouTube"
    rubric: youtube
    live:
      - label: youtube
        method: youtube_rss
        channel_id: "UCn8fIswollQTSAJYkAshjyw"   # @Bizzal_Games
        url: "https://www.youtube.com/@Bizzal_Games"
    source: Bizzal-Games-YT-PUB
    issue_repo: Bizzal-Games-YT-PUB

  - id: bizzal-games-instagram
    name: "Bizzal Games — Instagram"
    rubric: instagram
    live:
      - label: instagram
        method: deferred
        url: "https://www.instagram.com/bizzalgames70/"
    source: Bizzal-Games-YT-PUB
    issue_repo: Bizzal-Games-YT-PUB

  - id: itsalreadywritten
    name: "It's Already Written — Blog + X"
    rubric: blog
    live:
      - label: blog
        method: http
        url: "https://bizzal70.github.io/itsalreadywritten/"
      - label: x
        method: deferred
        url: "https://x.com/ItsAlrdyWritten"
    source: itsalreadywritten
    issue_repo: itsalreadywritten

  - id: itsalreadypriced
    name: "It's Already Priced — Blog + X"
    rubric: blog
    live:
      - label: blog
        method: http
        url: "https://bizzal70.github.io/itsalreadypriced/"
      - label: x
        method: deferred
        url: "https://x.com/ItsAlreadyPrice"
    source: itsalreadypriced
    issue_repo: itsalreadypriced

  - id: itsalreadywhen
    name: "It's Already When — Blog + X"
    rubric: blog
    live:
      - label: blog
        method: http
        url: "https://bizzal70.github.io/itsalreadywhen/"
      - label: x
        method: deferred
        url: "https://x.com/itsalreadywhen"
    source: itsalreadywhen
    issue_repo: itsalreadywhen
